<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GAGZBOT - Trop chaud pour ce monde</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#030712;--bg2:#080e1c;--bg3:#0b1220;
  --green:#00ff88;--cyan:#00d4ff;--magenta:#ff2d78;--yellow:#ffe500;
  --border:#1a2d4a;--text:#b8cce0;--muted:#3a5570;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;min-height:100vh}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:10px 12px 24px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px;}
.logo{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 15px var(--cyan)}
.logo span{color:var(--green)}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:2px;padding:3px 10px;border-radius:2px;border:1px solid}
.pill.live{color:var(--green);border-color:var(--green);background:rgba(0,255,136,0.06)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:2px;padding:4px 14px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);border-radius:2px;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(0,212,255,0.1)}
.timer-txt{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted)}
.timer-txt span{color:var(--cyan)}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px 12px;position:relative}
.kpi-label{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-bottom:3px}
.kpi-val{font-family:'Orbitron',monospace;font-weight:700;font-size:1.15rem;line-height:1.1}
.kpi-sub{font-size:.65rem;color:var(--muted)}

/* CHART */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:12px;height:280px;position:relative}
.chart-controls{display:flex;gap:6px;margin-bottom:8px}
.chart-btn{font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:2px;cursor:pointer}
.chart-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.1)}

/* DONUT & METRICS */
.donut-wrap{position:relative;width:68px;height:68px}
.donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:var(--green)}
.fees-val{color:var(--magenta);font-family:'Orbitron',monospace;font-weight:700}

/* TABLES */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:1px;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid rgba(26,45,74,0.4)}
tr:hover td{background:rgba(0,212,255,0.03)}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="logo">GAGZ<span>BOT</span> <span style="font-size:0.55rem;letter-spacing:2px;color:var(--muted)">TROP CHAUD POUR CE MONDE</span></div>
  <div class="top-right">
    <span class="pill live"><span class="dot"></span> LIVE</span>
    <button class="btn" onclick="fetchData()">⟳ REFRESH</button>
    <span class="timer-txt">AUTO <span id="cd">2</span>s</span>
  </div>
</div>

<div class="kpi-row">
  <div class="kpi"><div class="kpi-label">CAPITAL</div><div class="kpi-val cv" id="balance">--</div><div class="kpi-sub">USDC</div></div>
  <div class="kpi"><div class="kpi-label">PnL TOTAL</div><div class="kpi-val" id="pnl-total">--</div><div class="kpi-sub" id="pnl-pct">--</div></div>
  <div class="kpi"><div class="kpi-label">WIN RATE</div><div class="kpi-val" id="winrate">--</div><div class="kpi-sub" id="wl">-- W / -- L</div></div>
  <div class="kpi"><div class="kpi-label">DRAWDOWN</div><div class="kpi-val yv" id="drawdown">--</div></div>
  <div class="kpi"><div class="kpi-label">POSITIONS</div><div class="kpi-val cv" id="positions">-- / 5</div></div>
</div>

<div class="chart-card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:2px;color:var(--cyan)">EQUITY CURVE</div>
    <div class="chart-controls">
      <button class="chart-btn active" onclick="setRange('all',this)">TOUT (2000)</button>
      <button class="chart-btn" onclick="setRange(1000,this)">1000 pts</button>
      <button class="chart-btn" onclick="setRange(500,this)">500 pts</button>
    </div>
  </div>
  <canvas id="eqChart" height="180"></canvas>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
  <div class="table-card">
    <div style="font-family:'Orbitron',monospace;font-size:0.7rem;letter-spacing:2px;color:var(--cyan);margin-bottom:8px">POSITIONS OUVERTES (PnL LIVE)</div>
    <table><thead><tr><th>Marché</th><th>Wallet</th><th>Size</th><th>Entry</th><th>PnL Live</th></tr></thead><tbody id="pos-table"></tbody></table>
  </div>

  <div class="table-card">
    <div style="font-family:'Orbitron',monospace;font-size:0.7rem;letter-spacing:2px;color:var(--cyan);margin-bottom:8px">DERNIERS TRADES</div>
    <table><thead><tr><th>Heure</th><th>Wallet</th><th>Marché</th><th>Size</th><th>PnL</th></tr></thead><tbody id="trades-table"></tbody></table>
  </div>
</div>

</div>

<script>
const SUPABASE_URL = "https://kpmdddbpltfyjirjobcb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwbWRkZGJwbHRmeWppcmpvYmNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTQxMDksImV4cCI6MjA5MDg5MDEwOX0.xrdGsbG3TAIusHxf4IsIAFfl6wWGAHeKeiGOyvJGJ44";

const API = `${SUPABASE_URL}/rest/v1/bot_state?select=data&id=eq.1`;

const ctx = document.getElementById("eqChart").getContext("2d");
const gradient = ctx.createLinearGradient(0, 0, 0, 180);
gradient.addColorStop(0, "rgba(0,255,136,0.35)");
gradient.addColorStop(1, "rgba(0,255,136,0)");

const chart = new Chart(ctx, {
  type: "line",
  data: { labels: [], datasets: [{ label: "Equity", data: [], borderColor: "#00ff88", backgroundColor: gradient, borderWidth: 2.5, tension: 0.25, fill: true, pointRadius: 1.5 }] },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 0 },
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: "rgba(26,45,74,0.6)" }, ticks: { color: "#3a5570", font: { size: 9 }, maxTicksLimit: 20 } },
      y: { grid: { color: "rgba(26,45,74,0.6)" }, ticks: { color: "#3a5570", font: { size: 9 } } }
    }
  }
});

let allLabels = [];
let allValues = [];
let rangeMode = "all";

function setRange(mode, btn) {
  rangeMode = mode;
  document.querySelectorAll(".chart-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  updateChart();
}

function updateChart() {
  let labels = allLabels;
  let values = allValues;
  if (rangeMode !== "all") {
    const limit = parseInt(rangeMode);
    if (labels.length > limit) {
      labels = labels.slice(-limit);
      values = values.slice(-limit);
    }
  }
  chart.data.labels = labels;
  chart.data.datasets[0].data = values;
  chart.update("none");
}

function formatPnL(v) {
  return (v >= 0 ? "+" : "") + v.toFixed(2);
}

async function fetchData() {
  try {
    const res = await fetch(API, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });
    const json = await res.json();
    const d = json && json[0] ? json[0].data : {};

    // KPI
    document.getElementById("balance").textContent = "$" + (d.balance || 0).toFixed(2);
    const pnl = d.pnl_total || 0;
    document.getElementById("pnl-total").textContent = formatPnL(pnl) + "$";
    document.getElementById("pnl-total").style.color = pnl >= 0 ? "#00ff88" : "#ff2d78";
    document.getElementById("pnl-pct").textContent = (d.balance_start ? (pnl / d.balance_start * 100).toFixed(1) : 0) + "%";

    const wr = d.winrate || 0;
    document.getElementById("winrate").textContent = wr + "%";
    document.getElementById("wl").textContent = (d.wins || 0) + "W / " + (d.losses || 0) + "L";

    document.getElementById("drawdown").textContent = (d.drawdown || 0) + "%";
    document.getElementById("positions").textContent = (d.positions_open || 0) + " / " + (d.positions_max || 5);

    // Equity Curve (jusqu'à 2000 points)
    if (d.equity_curve && d.equity_curve.length > 0) {
      allLabels = d.equity_curve.map(e => e.ts || "");
      allValues = d.equity_curve.map(e => e.bal || 0);
      updateChart();
    }

    // Positions ouvertes avec PnL live
    const posBody = document.getElementById("pos-table");
    if (d.positions && d.positions.length > 0) {
      posBody.innerHTML = d.positions.map(p => {
        const livePnl = p.pnl !== undefined ? p.pnl : 0;
        return `<tr>
          <td>${p.market || "?"}</td>
          <td style="color:#00d4ff">${p.wallet || "?"}</td>
          <td>${p.size || 0}</td>
          <td>$${p.entry || 0}</td>
          <td style="color:${livePnl >= 0 ? '#00ff88' : '#ff2d78'}">${formatPnL(livePnl)}$</td>
        </tr>`;
      }).join("");
    } else {
      posBody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:15px">Aucune position ouverte</td></tr>`;
    }

    // Derniers trades
    const tradeBody = document.getElementById("trades-table");
    if (d.trades && d.trades.length > 0) {
      const last10 = d.trades.slice(-10);
      tradeBody.innerHTML = last10.map(t => {
        const tp = t.pnl || 0;
        return `<tr>
          <td style="color:var(--muted)">${t.time || "?"}</td>
          <td style="color:#00d4ff">${t.wallet || "?"}</td>
          <td>${t.market || "?"}</td>
          <td>${t.size || 0}</td>
          <td style="color:${tp >= 0 ? '#00ff88' : '#ff2d78'}">${formatPnL(tp)}$</td>
        </tr>`;
      }).join("");
    } else {
      tradeBody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:15px">Aucun trade clôturé</td></tr>`;
    }

  } catch(e) {
    console.error("Erreur Supabase fetch:", e);
  }
}

// Auto-refresh toutes les 2 secondes
let countdown = 2;
setInterval(() => {
  countdown--;
  document.getElementById("cd").textContent = countdown;
  if (countdown <= 0) {
    countdown = 2;
    fetchData();
  }
}, 2000);

fetchData(); // Premier chargement
</script>
</body>
</html>
