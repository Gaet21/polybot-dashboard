<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GAGZBOT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#030712;--bg2:#080e1c;--bg3:#0b1220;
  --green:#00ff88;--cyan:#00d4ff;--magenta:#ff2d78;--yellow:#ffe500;
  --border:#1a2d4a;--text:#b8cce0;--muted:#3a5570;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;min-height:100vh}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:10px 12px 24px}

.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px;}
.logo{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;letter-spacing:3px;
  color:var(--cyan);text-shadow:0 0 15px var(--cyan)}
.logo span{color:var(--green)}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:8px 12px}
.kpi-label{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.kpi-val{font-family:'Orbitron',monospace;font-weight:700;font-size:1.1rem}

.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:12px;height:220px;position:relative}
.card-title{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:3px;color:var(--cyan);margin-bottom:8px}

.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px}
table{width:100%;border-collapse:collapse;font-size:.72rem}
th{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--muted);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
td{padding:4px 6px;border-bottom:1px solid rgba(26,45,74,0.5)}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="logo">GAGZ<span>BOT</span> <span style="font-size:.5rem;color:var(--muted)">Trop chaud pour ce monde</span></div>
</div>

<div class="kpi-row">
  <div class="kpi">
    <div class="kpi-label">Capital</div>
    <div class="kpi-val" id="balance">$--</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">PnL Total</div>
    <div class="kpi-val" id="pnl-total">$--</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Win Rate</div>
    <div class="kpi-val" id="winrate">--%</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Drawdown</div>
    <div class="kpi-val" id="drawdown">--%</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Positions</div>
    <div class="kpi-val" id="positions">--</div>
  </div>
</div>

<!-- CHART - Hauteur fixe stricte -->
<div class="chart-card" style="height: 220px;">
  <div class="card-title">Equity Curve</div>
  <canvas id="eqChart" height="180" style="width:100%; height:180px !important;"></canvas>
</div>

</div>

<script>
const BIN = "69ccf57236566621a86ba9b9";
const API = "https://api.jsonbin.io/v3/b/"+BIN+"/latest";

const ctx = document.getElementById("eqChart").getContext("2d");
const chart = new Chart(ctx,{
  type:"line",
  data:{labels:[],datasets:[{label:"Capital",data:[],borderColor:"#00ff88",borderWidth:2.5,pointRadius:2,fill:false}]},
  options:{
    responsive: true,
    maintainAspectRatio: false,
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{font:{size:9}}},
      y:{ticks:{font:{size:9},callback:v=>"$"+v}}
    }
  }
});

let allData = {labels:[],data:[]};

async function fetchData(){
  try{
    const r = await fetch(API);
    const d = (await r.json()).record || {};

    document.getElementById("balance").textContent = "$" + (d.balance || 0).toFixed(2);
    document.getElementById("pnl-total").textContent = "$" + (d.pnl_total || 0).toFixed(2);
    document.getElementById("winrate").textContent = (d.winrate || 0) + "%";
    document.getElementById("drawdown").textContent = (d.drawdown || 0) + "%";
    document.getElementById("positions").textContent = (d.positions_open || 0) + " / " + (d.positions_max || 5);

    if(d.equity_curve && d.equity_curve.length > 0){
      allData.labels = d.equity_curve.map(e => e.ts || "");
      allData.data = d.equity_curve.map(e => e.bal || 0);
      chart.data.labels = allData.labels;
      chart.data.datasets[0].data = allData.data;
      chart.update();
    }
  } catch(e){
    console.error(e);
  }
}

fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
